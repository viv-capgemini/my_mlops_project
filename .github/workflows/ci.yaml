name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-train-build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.12"
      IMAGE_NAME: ml-model
      DOCKER_REPO: ${{ secrets.DOCKERHUB_USER }}/ml-model
      # If you later use S3/Azure/GCS, set secrets and uncomment in steps.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies (project + DVC)
        run: |
          python -m pip install -U pip
          pip install -r /model/requirements.txt
          # Install DVC core; pick extras later (s3/azure/gcs/ssh) as needed
          pip install "dvc"

      # --- Configure DVC remote credentials if you use cloud storage ---
      # - name: Configure DVC remote (S3 example)
      #   if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
      #   run: |
      #     dvc remote modify <remote-name> access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
      #     dvc remote modify <remote-name> secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
      #     dvc remote modify <remote-name> region "${{ secrets.AWS_DEFAULT_REGION }}"
      #
      # - name: Azure login for DVC (if using az cli auth)
      #   if: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING != '' }}
      #   run: |
      #     echo "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" >> $GITHUB_ENV
      #
      # - name: GCP auth for DVC
      #   if: ${{ secrets.GCP_SA_KEY_JSON != '' }}
      #   run: |
      #     echo '${{ secrets.GCP_SA_KEY_JSON }}' > $RUNNER_TEMP/gcp-key.json
      #     gcloud auth activate-service-account --key-file=$RUNNER_TEMP/gcp-key.json

      - name: Pull artifacts (if needed) via DVC
        run: |
          # If your code/tests need model/data
          dvc pull || true

      - name: Lint & Unit tests (adjust commands)
        run: |
          python -m pip install -U pytest pytest-cov flake8
          flake8 .
          pytest -q

      - name: Reproduce pipeline (optional in CI)
        run: |
          # If you want to verify pipeline runs deterministically
          dvc repro || true

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_REPO:ci-${{ github.sha }} .

      - name: Save image as artifact (optional)
        if: ${{ github.event_name == 'pull_request' }}
        uses: ishworkh/docker-image-artifact-upload@v1
        with:
          image: ${{ env.DOCKER_REPO }}:ci-${{ github.sha }}
