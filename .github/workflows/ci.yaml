name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-train-build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.12"
      IMAGE_NAME: ml-model
      DOCKER_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/ml-model
      # If you later use S3/Azure/GCS, set secrets and uncomment in steps.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('model/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_REPO:ci-${{ github.sha }} /model/.

      - name: Save image as artifact (optional)
        if: ${{ github.event_name == 'pull_request' }}
        uses: ishworkh/docker-image-artifact-upload@v1
        with:
          image: ${{ env.DOCKER_REPO }}:ci-${{ github.sha }}
