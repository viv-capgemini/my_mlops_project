name: Nightly Train & DVC Push

on:
  schedule:
    - cron: "0 15 * * *"   # 15:00 UTC daily (3 PM London)
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  train-and-push:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.12"
      GIT_USER_NAME: "github-actions[bot]"
      GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps + DVC (with your storage backend if needed)
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install "dvc"
          # pip install "dvc[s3]" or "dvc[azure]" "dvc[gcs]" as needed

      # Configure cloud credentials for DVC if applicable (uncomment example blocks below)
      # - name: Configure DVC remote (S3 example)
      #   run: |
      #     dvc remote modify <remote-name> access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
      #     dvc remote modify <remote-name> secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
      #     dvc remote modify <remote-name> region "${{ secrets.AWS_DEFAULT_REGION }}"

      - name: Reproduce pipeline
        run: |
          dvc pull || true   # get any required inputs
          dvc repro

      - name: Track new/changed artifacts & push to DVC remote
        run: |
          dvc push

      - name: Commit pointer changes (if any)
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly training - update DVC pointers [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
