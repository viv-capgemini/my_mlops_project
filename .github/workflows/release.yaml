name: Release - Build & Push Image

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*"
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.12"
      DOCKER_REPO: ${{ secrets.DOCKERHUB_USER }}/ml-model
      IMAGE_TAG: ${{ github.ref_name }} # e.g., v1.2.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install DVC (if you need dvc pull before build)
        run: |
          python -m pip install -U pip
          pip install "dvc"
          # If the Docker build expects artifacts present (e.g., baked into image), do:
          # dvc pull

      - name: Docker login (Docker Hub)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ env.DOCKER_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REPO }}:latest
